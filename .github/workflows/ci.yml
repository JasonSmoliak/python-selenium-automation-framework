name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # daily at 09:00 UTC (adjust later if you want)

jobs:
  fast-checks:
    name: Fast checks (API + smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: |
          python -m pytest -m api -q

      - name: Run smoke suite
        env:
          BASE_URL: https://example.com
        run: |
          python -m pytest -m smoke -q

  ui-regression:
    name: UI regression (scheduled/manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run UI regression tests (with retries)
        env:
          BASE_URL: https://example.com
        run: |
          python -m pytest -m ui -q --reruns 2 --reruns-delay 1
