name: CI

on:
  push:
  pull_request:

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        run: python -m pytest -m api -q --html=reports/api_report.html --self-contained-html

      - name: Upload API report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: reports/api_report.html

      - name: Upload API logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-logs
          path: logs/
          if-no-files-found: ignore

  ui-tests:
    name: UI Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, edge]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run UI tests
        run: BROWSER=${{ matrix.browser }} python -m pytest -m ui -n 4 -q --html=reports/ui_report_${{ matrix.browser }}.html --self-contained-html

      - name: Upload UI report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report-${{ matrix.browser }}
          path: reports/ui_report_${{ matrix.browser }}.html

      - name: Upload UI failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots-${{ matrix.browser }}
          path: screenshots/ui/failures/

      - name: Upload UI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-logs-${{ matrix.browser }}
          path: logs/
	if-no-files-found: ignore
